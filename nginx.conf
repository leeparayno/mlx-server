events {
    worker_connections 1024;
}

http {
    upstream mlx_backend {
        # Multiple backend servers for load balancing
        server mlx-server:8080 max_fails=3 fail_timeout=30s;
        # Add more servers as needed:
        # server mlx-server-2:8080 max_fails=3 fail_timeout=30s;
        # server mlx-server-3:8080 max_fails=3 fail_timeout=30s;
    }

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS (uncomment for production)
        # return 301 https://$server_name$request_uri;

        # Or allow HTTP (for development)
        location / {
            proxy_pass http://mlx_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Health check endpoint (no rate limit)
        location /health {
            proxy_pass http://mlx_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Metrics endpoint (no rate limit)
        location /metrics {
            proxy_pass http://mlx_backend/metrics;
            proxy_set_header Host $host;
            access_log off;
        }
    }

    # HTTPS server (uncomment for production)
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass http://mlx_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #
    #         # SSE streaming support
    #         proxy_http_version 1.1;
    #         proxy_set_header Connection "";
    #         proxy_buffering off;
    #         proxy_cache off;
    #         chunked_transfer_encoding on;
    #
    #         # Timeouts
    #         proxy_connect_timeout 60s;
    #         proxy_send_timeout 300s;
    #         proxy_read_timeout 300s;
    #
    #         # Rate limiting
    #         limit_req zone=api_limit burst=20 nodelay;
    #     }
    # }
}
