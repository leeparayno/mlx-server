apiVersion: v1
kind: Service
metadata:
  name: mlx-server
  labels:
    app: mlx-server
spec:
  type: LoadBalancer  # Use ClusterIP for internal, LoadBalancer for external
  selector:
    app: mlx-server
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  sessionAffinity: ClientIP  # Sticky sessions for better caching
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
---
apiVersion: v1
kind: Service
metadata:
  name: mlx-server-internal
  labels:
    app: mlx-server
spec:
  type: ClusterIP  # Internal service for pod-to-pod communication
  selector:
    app: mlx-server
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
